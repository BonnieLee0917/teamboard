name = "teamboard-api"
main = "src/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "teamboard-prod"
database_id = "REPLACE_WITH_D1_ID"   # set after: wrangler d1 create teamboard-prod

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_classes = ["RoomDO"]

[ai]
binding = "AI"

# Non-sensitive vars (Kane 17:20 lock)
[vars]
DISCORD_APP_ID     = "REPLACE_WITH_APP_ID"
DISCORD_GUILD_ID   = "REPLACE_WITH_GUILD_ID"
DISCORD_CHANNEL_ID = "1498562870110064761"  # #agent-team

# Secrets (set via wrangler secret put):
#   TEAMBOARD_TOKEN          - web client auth
#   DISCORD_BOT_TOKEN        - bot auth (Bearer)
#   DISCORD_PUBLIC_KEY       - Ed25519 sig verify
#   HMAC_SHARED_SECRET       - inbound webhook signing (our own)

[triggers]
crons = ["0 15 * * *"]   # 23:00 Asia/Shanghai = 15:00 UTC, AI 日报
